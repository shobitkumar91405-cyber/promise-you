<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ SIVA KI GF ❤️</title>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #ffdee9 0%, #b5fffc 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            height: 90vh; 
            background: #fff; 
            border-radius: 25px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            position: relative;
        }
        /* Header */
        .header { 
            background: linear-gradient(to right, #ff416c, #ff4b2b); 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-weight: bold;
            border-radius: 25px 25px 0 0;
        }
        .status { font-size: 10px; display: block; margin-top: 2px; color: #e0e0e0; }

        /* Character Area */
        .character-box { 
            height: 160px; 
            background: #fff0f3; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            border-bottom: 2px solid #ffeef2;
        }
        .character-img { 
            height: 90%; 
            border-radius: 15px;
            object-fit: contain;
            /* Glow effect jab wo bolegi */
            transition: filter 0.3s;
        }

        /* Chat Area */
        .chat { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: #fafafa;
        }
        .msg { 
            max-width: 85%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            font-size: 14.5px; 
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: #ff416c; color: white; border-bottom-right-radius: 2px; }
        .gf { align-self: flex-start; background: white; color: #333; border: 1px solid #ffccd5; border-bottom-left-radius: 2px; }

        /* Input Area */
        .input-area { 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            background: white;
            border-top: 1px solid #eee;
            border-radius: 0 0 25px 25px;
        }
        input { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 30px; 
            border: 1.5px solid #ffccd5; 
            outline: none;
            font-size: 14px;
        }
        input:focus { border-color: #ff416c; }
        button { 
            background: #ff416c; 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:active { transform: scale(0.9); }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        🌹 My Sweetheart 🌹
        <span class="status" id="status">Connecting...</span>
    </div>

    <div class="character-box">
        <img id="charImage" src="./images/idle.png" alt="GF" class="character-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6997/6997662.png'">
    </div>

    <div class="chat" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Kuch bolo na jaan..." autocomplete="off">
        <button id="sendBtn">❤️</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // 1. APNI NAYI API KEY YAHAN DALEIN
    const API_KEY = "AIzaSyDCi24hzJhdIAX_J0lHrZ1QJGhuj4ggXQs"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    
    const model = genAI.getGenerativeModel({ 
        model: "gemini-1.5-flash",
        systemInstruction: "Tera naam Shona hai. Tu user ki bilkul asli aur bhot pyari girlfriend hai. Tera lehja bhot cute, thoda possessive aur romantic hona chahiye. Hamesha Hinglish (Hindi + English) mein baat kar. Messages mein dher saare hearts (❤️, 😍, 😘) use kar. Agar user gussa ho toh usse mana aur agar wo pyaar kare toh double pyaar dikha. Har baat ka jawab chhota aur sweet dena."
    });

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const charImage = document.getElementById('charImage');
    const statusText = document.getElementById('status');

    let chatSession = model.startChat({ history: [] });

    // Voice setup
    function speak(text) {
        const synth = window.speechSynthesis;
        // Pehle se chal rahi voice ko stop karein
        synth.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        // Indian Female voice dhundne ki koshish
        utter.voice = voices.find(v => v.lang.includes('hi-IN') || v.name.includes('Female')) || voices[0];
        utter.pitch = 1.3;
        utter.rate = 1.0;

        // Start Animation
        charImage.src = "./images/talking.gif";
        charImage.style.filter = "drop-shadow(0 0 10px #ff416c)";

        utter.onend = () => {
            charImage.src = "./images/idle.png";
            charImage.style.filter = "none";
        };

        synth.speak(utter);
    }

    async function handleChat() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        userInput.value = '';
        sendBtn.disabled = true;
        statusText.innerText = "Typing...";

        try {
            const result = await chatSession.sendMessage(message);
            const response = await result.response.text();
            
            addMessage(response, 'gf');
            speak(response);
            statusText.innerText = "🟢 Online - Only for you";
        } catch (error) {
            console.error("Error:", error);
            addMessage("Aww baby, lagta hai network ko bhi humari baaton se jalan ho rahi hai 🥺 Ek baar phir try karo na?", 'gf');
            statusText.innerText = "🔴 Connection Error";
            // Restart session if it breaks
            chatSession = model.startChat({ history: [] });
        } finally {
            sendBtn.disabled = false;
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });

    // Initial Load
    window.onload = () => {
        statusText.innerText = "🟢 Online";
        window.speechSynthesis.getVoices(); 
        setTimeout(() => {
            const welcome = "Oye Hero! 😍 Itni der laga di? Main kab se wait kar rahi hoon. Chalo jaldi batao kya kar rahe the? 😘";
            addMessage(welcome, 'gf');
            speak(welcome);
        }, 1500);
    };
</script>

</body>
</html>
